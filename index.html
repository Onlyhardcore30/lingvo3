<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lingvo3</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body { height: 100%; font-family: 'Outfit', sans-serif; color: #f0f0ff; overflow: hidden; }

  body {
    background: linear-gradient(135deg, #1a0a2e 0%, #2d1b69 30%, #1a3a8f 60%, #2d1b69 80%, #3d0a1a 100%);
    background-size: 400% 400%;
    animation: bgShift 15s ease infinite;
  }
  @keyframes bgShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  :root {
    --card: rgba(255,255,255,0.08);
    --card-hover: rgba(255,255,255,0.13);
    --border: rgba(255,255,255,0.15);
    --text: #f0f0ff;
    --muted: rgba(240,240,255,0.45);
    --accent: #7c9fff;
    --accent2: #c084fc;
  }

  .app {
    position: relative; z-index: 1; height: 100vh;
    display: flex; flex-direction: column;
    padding: 12px 14px 10px; gap: 10px;
  }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .logo {
    font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
    background: linear-gradient(135deg, #a5c0ff, #e0aaff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .logo span { font-weight: 300; }
  .header-icons { display: flex; gap: 8px; }
  .header-icon-btn {
    width: 38px; height: 38px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; backdrop-filter: blur(20px); transition: all 0.2s;
  }
  .header-icon-btn:active { transform: scale(0.9); }
  .header-icon-btn.active { border-color: var(--accent); background: rgba(124,159,255,0.15); }

  /* Lang switcher */
  .lang-switcher {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; flex-shrink: 0;
  }
  .flag-btn {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 8px 16px; min-width: 72px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; cursor: pointer; backdrop-filter: blur(20px);
    transition: all 0.15s cubic-bezier(0.34,1.56,0.64,1); user-select: none;
  }
  .flag-btn:active {
    transform: scale(0.93) translateY(2px);
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.3);
    background: rgba(255,255,255,0.04);
  }
  .flag-btn.selected {
    border-color: rgba(124,159,255,0.6);
    background: rgba(124,159,255,0.12);
    box-shadow: 0 0 12px rgba(124,159,255,0.2);
  }
  .flag-emoji { font-size: 26px; line-height: 1; }
  .flag-label { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.5px; }
  .flag-btn.selected .flag-label { color: var(--accent); }

  .swap-btn {
    background: rgba(124,159,255,0.15); border: 1px solid rgba(124,159,255,0.3);
    border-radius: 12px; width: 40px; height: 40px;
    cursor: pointer; font-size: 18px; color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s; flex-shrink: 0;
  }
  .swap-btn:active { transform: rotate(180deg) scale(0.9); }

  /* Lang picker dropdown */
  .lang-picker {
    position: fixed; z-index: 50; top: 130px;
    background: rgba(20,10,45,0.97); border: 1px solid var(--border);
    border-radius: 16px; padding: 8px;
    backdrop-filter: blur(30px);
    display: none; flex-direction: column; gap: 4px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.5); min-width: 140px;
  }
  .lang-picker.show { display: flex; }
  .lang-picker.left { left: 14px; }
  .lang-picker.right { right: 14px; }
  .lang-option {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 10px; cursor: pointer;
    font-size: 14px; font-weight: 600; transition: background 0.15s;
  }
  .lang-option:active { background: rgba(124,159,255,0.15); }
  .lang-option.active { color: var(--accent); }

  /* Cards */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 14px 16px;
    backdrop-filter: blur(20px); transition: border-color 0.2s;
  }
  .card:focus-within { border-color: rgba(124,159,255,0.45); }
  .card-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--muted); margin-bottom: 8px;
  }
  textarea {
    width: 100%; background: transparent; border: none; outline: none;
    color: var(--text); font-family: 'Outfit', sans-serif;
    font-size: 17px; resize: none; line-height: 1.5; min-height: 90px;
  }
  textarea::placeholder { color: var(--muted); }
  .input-actions {
    display: flex; justify-content: space-between; align-items: center; margin-top: 6px;
  }
  .char-count { font-size: 11px; color: var(--muted); }
  .action-btns { display: flex; gap: 8px; }
  .icon-btn {
    background: rgba(255,255,255,0.07); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 10px; cursor: pointer;
    font-size: 14px; color: var(--muted); transition: all 0.2s;
  }
  .icon-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.12); }
  .icon-btn.recording { color: #ff6b6b; border-color: #ff6b6b; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.5} }

  .result-text { font-size: 17px; font-weight: 500; line-height: 1.5; min-height: 60px; }
  .result-text.placeholder { color: var(--muted); font-weight: 400; font-style: italic; }
  .result-actions {
    display: flex; justify-content: flex-end; gap: 8px;
    margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);
  }

  /* Translating dots */
  .translating { display: none; align-items: center; gap: 6px; margin-bottom: 6px; }
  .translating.show { display: flex; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: dotP 1.2s infinite; }
  .dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
  @keyframes dotP { 0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)} }

  /* Screens */
  .screen { display: none; flex: 1; flex-direction: column; gap: 10px; min-height: 0; overflow: hidden; }
  .screen.active { display: flex; }

  .list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
  .list-item {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 12px 14px; cursor: pointer;
    backdrop-filter: blur(10px); transition: background 0.2s;
  }
  .list-item:active { background: var(--card-hover); }
  .item-from { font-size: 13px; color: var(--muted); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-to { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-meta { display: flex; justify-content: space-between; margin-top: 6px; }
  .item-lang { font-size: 11px; color: var(--accent); font-weight: 700; }
  .item-time { font-size: 11px; color: var(--muted); }

  .empty-state { text-align: center; padding: 50px 20px; color: var(--muted); }
  .empty-icon { font-size: 44px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }

  .settings-row {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 16px; backdrop-filter: blur(10px);
    display: flex; justify-content: space-between; align-items: center;
  }
  .settings-label { font-size: 14px; font-weight: 600; }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(10px);
    background: rgba(20,10,45,0.97); border: 1px solid var(--border);
    padding: 10px 20px; border-radius: 12px; font-size: 13px; font-weight: 600;
    backdrop-filter: blur(20px); opacity: 0; transition: all 0.25s; z-index: 100; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .fade-in { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)} }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo">Lingvo<span>3</span></div>
    <div class="header-icons">
      <div class="header-icon-btn" data-panel="history">🕒</div>
      <div class="header-icon-btn" data-panel="favorites">⭐</div>
      <div class="header-icon-btn" data-panel="settings">⚙️</div>
    </div>
  </div>

  <div class="lang-switcher">
    <div class="flag-btn selected" id="srcBtn">
      <div class="flag-emoji" id="srcFlag">🇷🇺</div>
      <div class="flag-label" id="srcLabel">RU</div>
    </div>
    <button class="swap-btn" id="swapBtn">⇄</button>
    <div class="flag-btn" id="dstBtn">
      <div class="flag-emoji" id="dstFlag">🇬🇧</div>
      <div class="flag-label" id="dstLabel">EN</div>
    </div>
  </div>

  <div class="lang-picker left" id="srcPicker"></div>
  <div class="lang-picker right" id="dstPicker"></div>

  <div class="screen active" id="screen-translate">
    <div class="card">
      <div class="card-label">Оригинал</div>
      <textarea id="inputText" placeholder="Введите текст..." maxlength="1000"></textarea>
      <div class="input-actions">
        <span class="char-count"><span id="charCount">0</span>/1000</span>
        <div class="action-btns">
          <button class="icon-btn" id="micBtn">🎤</button>
          <button class="icon-btn" id="clearBtn">✕</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Перевод</div>
      <div class="translating" id="translating">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
      <div class="result-text placeholder" id="resultText">Перевод появится здесь...</div>
      <div class="result-actions">
        <button class="icon-btn" id="favBtn">⭐</button>
        <button class="icon-btn" id="speakBtn">🔊</button>
        <button class="icon-btn" id="copyBtn">📋</button>
      </div>
    </div>
  </div>

  <div class="screen" id="screen-history">
    <div class="list" id="historyList"></div>
  </div>

  <div class="screen" id="screen-favorites">
    <div class="list" id="favList"></div>
  </div>

  <div class="screen" id="screen-settings">
    <div class="card">
      <div class="card-label">О боте</div>
      <div style="font-size:14px;color:var(--muted);line-height:1.7">
        Lingvo3 — переводчик для Telegram<br>
        Поддерживает: RU ↔ EN ↔ UK<br>
        Автоперевод при вводе текста
      </div>
    </div>
    <div class="settings-row">
      <span class="settings-label">Очистить историю</span>
      <button class="icon-btn" id="clearHistoryBtn">🗑</button>
    </div>
    <div class="settings-row">
      <span class="settings-label">Очистить избранное</span>
      <button class="icon-btn" id="clearFavBtn">🗑</button>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram?.WebApp;
if(tg){tg.expand();}
function haptic(t='light'){try{tg?.HapticFeedback?.impactOccurred(t);}catch(e){}}

function load(k,d){try{return JSON.parse(localStorage.getItem(k))??d;}catch{return d;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

let history=load('l3_history',[]);
let favorites=load('l3_favorites',[]);

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

const LANGS=[
  {code:'ru',flag:'🇷🇺',label:'RU',speech:'ru-RU'},
  {code:'en',flag:'🇬🇧',label:'EN',speech:'en-US'},
  {code:'uk',flag:'🇺🇦',label:'UK',speech:'uk-UA'},
];
let srcLang=LANGS[0], dstLang=LANGS[1];
function getLang(c){return LANGS.find(l=>l.code===c);}

function renderBtn(side){
  const l=side==='src'?srcLang:dstLang;
  document.getElementById(side+'Flag').textContent=l.flag;
  document.getElementById(side+'Label').textContent=l.label;
}

function buildPicker(id,side){
  const p=document.getElementById(id); p.innerHTML='';
  const other=side==='src'?dstLang:srcLang;
  LANGS.filter(l=>l.code!==other.code).forEach(lang=>{
    const cur=side==='src'?srcLang:dstLang;
    const d=document.createElement('div');
    d.className='lang-option'+(lang.code===cur.code?' active':'');
    d.innerHTML=`<span style="font-size:20px">${lang.flag}</span>${lang.label}`;
    d.onclick=()=>{
      haptic('medium');
      if(side==='src')srcLang=lang;else dstLang=lang;
      renderBtn(side); p.classList.remove('show'); doTranslate();
    };
    p.appendChild(d);
  });
}

document.getElementById('srcBtn').addEventListener('click',e=>{
  e.stopPropagation();
  buildPicker('srcPicker','src');
  document.getElementById('srcPicker').classList.toggle('show');
  document.getElementById('dstPicker').classList.remove('show');
});
document.getElementById('dstBtn').addEventListener('click',e=>{
  e.stopPropagation();
  buildPicker('dstPicker','dst');
  document.getElementById('dstPicker').classList.toggle('show');
  document.getElementById('srcPicker').classList.remove('show');
});
document.addEventListener('click',()=>{
  document.getElementById('srcPicker').classList.remove('show');
  document.getElementById('dstPicker').classList.remove('show');
});

document.getElementById('swapBtn').addEventListener('click',()=>{
  haptic('medium');
  const tmp=srcLang;srcLang=dstLang;dstLang=tmp;
  renderBtn('src');renderBtn('dst');
  const inp=document.getElementById('inputText');
  const res=document.getElementById('resultText');
  if(!res.classList.contains('placeholder')){
    const t=inp.value;inp.value=res.textContent;updateCharCount();res.textContent=t;
  }
  doTranslate();
});

renderBtn('src');renderBtn('dst');

let currentPanel=null;
document.querySelectorAll('.header-icon-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    haptic('light');
    const panel=btn.dataset.panel;
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    if(currentPanel===panel){
      btn.classList.remove('active');
      document.querySelectorAll('.header-icon-btn').forEach(b=>b.classList.remove('active'));
      document.getElementById('screen-translate').classList.add('active');
      currentPanel=null;
    } else {
      document.querySelectorAll('.header-icon-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('screen-'+panel).classList.add('active');
      currentPanel=panel;
      if(panel==='history')renderHistory();
      if(panel==='favorites')renderFavorites();
    }
  });
});

const inputText=document.getElementById('inputText');
let autoTimer=null, lastResult=null;

function updateCharCount(){document.getElementById('charCount').textContent=inputText.value.length;}

inputText.addEventListener('input',()=>{
  updateCharCount();
  clearTimeout(autoTimer);
  if(!inputText.value.trim()){resetResult();return;}
  autoTimer=setTimeout(doTranslate,800);
});

function resetResult(){
  const r=document.getElementById('resultText');
  r.textContent='Перевод появится здесь...';r.classList.add('placeholder');
  document.getElementById('favBtn').classList.remove('active');
  document.getElementById('translating').classList.remove('show');
  lastResult=null;
}

async function doTranslate(){
  const text=inputText.value.trim();
  if(!text){resetResult();return;}
  const resultEl=document.getElementById('resultText');
  const translating=document.getElementById('translating');
  resultEl.style.display='none';translating.classList.add('show');
  try{
    const url=`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${srcLang.code}|${dstLang.code}`;
    const resp=await fetch(url);
    const data=await resp.json();
    const translated=data.responseData?.translatedText;
    if(!translated)throw new Error();
    translating.classList.remove('show');
    resultEl.style.display='';
    resultEl.textContent=translated;
    resultEl.classList.remove('placeholder');
    lastResult={src:text,dst:translated,srcLang:srcLang.code,dstLang:dstLang.code,time:Date.now()};
    history.unshift(lastResult);
    if(history.length>50)history.pop();
    save('l3_history',history);
    document.getElementById('favBtn').classList.remove('active');
  }catch(e){
    translating.classList.remove('show');
    resultEl.style.display='';
    resultEl.textContent='⚠️ Ошибка. Проверьте интернет.';
    resultEl.classList.add('placeholder');
  }
}

document.getElementById('clearBtn').addEventListener('click',()=>{
  haptic('light');inputText.value='';updateCharCount();resetResult();
});

document.getElementById('copyBtn').addEventListener('click',()=>{
  const r=document.getElementById('resultText');
  if(r.classList.contains('placeholder'))return;
  haptic('light');
  navigator.clipboard?.writeText(r.textContent).then(()=>toast('Скопировано ✓'));
});

document.getElementById('speakBtn').addEventListener('click',()=>{
  const r=document.getElementById('resultText');
  if(r.classList.contains('placeholder'))return;
  haptic('light');
  const utt=new SpeechSynthesisUtterance(r.textContent);
  utt.lang=dstLang.speech;speechSynthesis.speak(utt);
});

document.getElementById('favBtn').addEventListener('click',()=>{
  if(!lastResult)return;haptic('medium');
  const btn=document.getElementById('favBtn');
  const exists=favorites.find(f=>f.src===lastResult.src&&f.srcLang===lastResult.srcLang);
  if(exists){
    favorites=favorites.filter(f=>!(f.src===lastResult.src&&f.srcLang===lastResult.srcLang));
    btn.classList.remove('active');toast('Удалено из избранного');
  }else{
    favorites.unshift(lastResult);btn.classList.add('active');toast('Добавлено в избранное ⭐');
  }
  save('l3_favorites',favorites);
});

const micBtn=document.getElementById('micBtn');
if('webkitSpeechRecognition' in window||'SpeechRecognition' in window){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const rec=new SR();rec.continuous=false;rec.interimResults=false;
  rec.onresult=e=>{inputText.value=e.results[0][0].transcript;updateCharCount();micBtn.classList.remove('recording');micBtn.textContent='🎤';doTranslate();};
  rec.onerror=rec.onend=()=>{micBtn.classList.remove('recording');micBtn.textContent='🎤';};
  micBtn.addEventListener('click',()=>{haptic('medium');rec.lang=srcLang.speech;rec.start();micBtn.classList.add('recording');micBtn.textContent='⏹';});
}else{micBtn.style.display='none';}

const FLAGS={ru:'🇷🇺',en:'🇬🇧',uk:'🇺🇦'};
function timeAgo(ts){
  const d=Date.now()-ts;
  if(d<60000)return'только что';
  if(d<3600000)return Math.floor(d/60000)+' мин назад';
  if(d<86400000)return Math.floor(d/3600000)+' ч назад';
  return new Date(ts).toLocaleDateString('ru');
}

function makeItem(h,onclick){
  const div=document.createElement('div');div.className='list-item fade-in';
  div.innerHTML=`<div class="item-from">${h.src}</div><div class="item-to">${h.dst}</div><div class="item-meta"><span class="item-lang">${FLAGS[h.srcLang]} → ${FLAGS[h.dstLang]}</span><span class="item-time">${timeAgo(h.time)}</span></div>`;
  div.onclick=onclick;return div;
}

function loadItem(item){
  haptic('light');
  srcLang=getLang(item.srcLang);dstLang=getLang(item.dstLang);
  renderBtn('src');renderBtn('dst');
  inputText.value=item.src;updateCharCount();
  const r=document.getElementById('resultText');
  r.textContent=item.dst;r.classList.remove('placeholder');
  lastResult=item;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.header-icon-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-translate').classList.add('active');
  currentPanel=null;
}

function renderHistory(){
  const el=document.getElementById('historyList');el.innerHTML='';
  if(!history.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">🕒</div><div class="empty-text">История пуста</div></div>';return;}
  history.forEach(h=>el.appendChild(makeItem(h,()=>loadItem(h))));
}

function renderFavorites(){
  const el=document.getElementById('favList');el.innerHTML='';
  if(!favorites.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">⭐</div><div class="empty-text">Нет избранных</div></div>';return;}
  favorites.forEach(h=>el.appendChild(makeItem(h,()=>loadItem(h))));
}

document.getElementById('clearHistoryBtn').addEventListener('click',()=>{haptic('medium');history=[];save('l3_history',history);toast('История очищена');});
document.getElementById('clearFavBtn').addEventListener('click',()=>{haptic('medium');favorites=[];save('l3_favorites',favorites);toast('Избранное очищено');});
</script>
</body>
</html>
